<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin PRO</title>

<style>
body {
  font-family: Arial;
  background: #12121f;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  background: #1f1f35;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* CONTENEDOR */
.container {
  padding: 20px;
}

/* FORM */
.form {
  background: #1f1f35;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 5px;
}

.btn-primary { background: #00c3ff; color: white; }
.btn-danger { background: red; color: white; }

/* PRODUCTOS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #1f1f35;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #1f1f35;
  width: 400px;
  margin: 10% auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>📦 PANEL ADMIN PRO</header>

<div class="container">

  <!-- FORM CREAR -->
  <div class="form">
    <h3>Crear Producto</h3>
    <input id="nombre" placeholder="Nombre">
    <textarea id="descripcion" placeholder="Descripción"></textarea>
    <input id="categoria" placeholder="Categoría">
    <input id="precio" placeholder="Precio">
    <input type="file" id="imagen">

    <img id="preview" width="100" style="display:none; margin-top:10px;">

    <button class="btn-primary" onclick="crear()">Crear</button>
  </div>

  <!-- LISTA -->
  <div class="grid" id="lista"></div>

</div>

<!-- MODAL EDITAR -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Editar Producto</h3>

    <input id="editNombre">
    <textarea id="editDescripcion"></textarea>
    <input id="editCategoria">
    <input id="editPrecio">
    <input type="file" id="editImagen">

    <button class="btn-primary" onclick="actualizar()">Actualizar</button>
    <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
const API = "https://backend-catalogo-r31s.onrender.com";
const CLOUD_NAME = "dlnw3ss7h";
const UPLOAD_PRESET = "unsigned_preset";

let editId = null;

/* SUBIR IMAGEN */
async function subirImagen(file) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
    method: "POST",
    body: form
  });

  const data = await res.json();
  return data.secure_url;
}

/* PREVIEW */
imagen.onchange = () => {
  const file = imagen.files[0];
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
};

/* CREAR */
async function crear() {
  const file = imagen.files[0];
  if (!file) return alert("Selecciona imagen");

  const url = await subirImagen(file);

  await fetch(API + "/productos", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nombre: nombre.value,
      descripcion: descripcion.value,
      categoria: categoria.value,
      precio: precio.value,
      imagen: url
    })
  });

  cargar();
}

/* CARGAR */
async function cargar() {
  const res = await fetch(API + "/productos");
  const data = await res.json();

  lista.innerHTML = "";

  data.forEach(p => {
    lista.innerHTML += `
      <div class="card">
        <img src="${p.imagen}">
        <b>${p.nombre}</b>
        <p>${p.descripcion}</p>
        <p>$ ${p.precio}</p>

        <button class="btn-primary" onclick='abrirEditar(${JSON.stringify(p)})'>Editar</button>
        <button class="btn-danger" onclick="eliminar(${p.id})">Eliminar</button>
      </div>
    `;
  });
}

/* ABRIR MODAL */
function abrirEditar(p) {
  editId = p.id;

  editNombre.value = p.nombre;
  editDescripcion.value = p.descripcion;
  editCategoria.value = p.categoria;
  editPrecio.value = p.precio;

  modal.style.display = "block";
}

/* CERRAR MODAL */
function cerrarModal() {
  modal.style.display = "none";
}

/* ACTUALIZAR */
async function actualizar() {
  let imagenUrl = null;

  if (editImagen.files[0]) {
    imagenUrl = await subirImagen(editImagen.files[0]);
  }

  const data = {
    nombre: editNombre.value,
    descripcion: editDescripcion.value,
    categoria: editCategoria.value,
    precio: editPrecio.value
  };

  if (imagenUrl) data.imagen = imagenUrl;

  await fetch(API + "/productos/" + editId, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  cerrarModal();
  cargar();
}

/* ELIMINAR */
async function eliminar(id) {
  await fetch(API + "/productos/" + id, { method: "DELETE" });
  cargar();
}

cargar();
</script>

</body>
</html>
