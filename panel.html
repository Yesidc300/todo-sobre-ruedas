<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin PRO</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  padding: 20px;
}

h2 {
  text-align: center;
}

.form {
  background: #2f2f4f;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  background: #00c3ff;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  margin: 3px;
}

.producto {
  background: #2f2f4f;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>📦 Panel Admin PRO</h2>

<div class="form">
  <input id="nombre" placeholder="Nombre">
  <textarea id="descripcion" placeholder="Descripción"></textarea>
  <input id="categoria" placeholder="Categoría">
  <input id="precio" placeholder="Precio">

  <input type="file" id="imagenFile">

  <button onclick="crear()">Crear Producto</button>
  <button onclick="actualizar()">Actualizar Producto</button>
</div>

<div id="lista"></div>

<script>
const API = "https://backend-catalogo-r31s.onrender.com";

if (!localStorage.getItem("admin")) {
  alert("No autorizado");
  window.location.href = "admin.html";
}

// ☁️ CLOUDINARY
const CLOUD_NAME = "dlnw3ss7h";
const UPLOAD_PRESET = "unsigned_preset";

let productoEditando = null;

// 📤 Subir imagen
async function subirImagen(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: formData }
  );

  const data = await res.json();
  return data.secure_url;
}

// 🟢 CREAR
async function crear() {
  const file = imagenFile.files[0];

  if (!file) return alert("Selecciona imagen");

  const imagenUrl = await subirImagen(file);

  await fetch(API + "/productos", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nombre: nombre.value,
      descripcion: descripcion.value,
      categoria: categoria.value,
      precio: precio.value,
      imagen: imagenUrl,
      galeria: "",
      badge: ""
    })
  });

  limpiar();
  cargar();
}

// ✏️ CARGAR EN FORMULARIO
function editar(p) {
  productoEditando = p.id;

  nombre.value = p.nombre;
  descripcion.value = p.descripcion;
  categoria.value = p.categoria;
  precio.value = p.precio;
}

// 🔄 ACTUALIZAR
async function actualizar() {
  if (!productoEditando) {
    return alert("Selecciona un producto para editar");
  }

  let imagenUrl = "";

  const file = imagenFile.files[0];

  if (file) {
    imagenUrl = await subirImagen(file);
  }

  await fetch(API + "/productos/" + productoEditando, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nombre: nombre.value,
      descripcion: descripcion.value,
      categoria: categoria.value,
      precio: precio.value,
      imagen: imagenUrl,
      galeria: "",
      badge: ""
    })
  });

  limpiar();
  cargar();
}

// 🧹 LIMPIAR FORM
function limpiar() {
  nombre.value = "";
  descripcion.value = "";
  categoria.value = "";
  precio.value = "";
  imagenFile.value = "";
  productoEditando = null;
}

// 🔄 CARGAR
async function cargar() {
  const res = await fetch(API + "/productos");
  const data = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(p => {
    lista.innerHTML += `
      <div class="producto">
        <img src="${p.imagen}" width="120"><br>
        <b>${p.nombre}</b><br>
        ${p.descripcion}<br>
        💲 ${p.precio}<br>

        <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
        <button onclick="eliminar(${p.id})">Eliminar</button>
      </div>
    `;
  });
}

// 🗑 ELIMINAR
async function eliminar(id) {
  await fetch(API + "/productos/" + id, { method: "DELETE" });
  cargar();
}

cargar();
</script>

</body>
</html>
