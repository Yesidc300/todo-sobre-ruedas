<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo sobre ruedas</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #E63946;
    color: white;
    padding: 15px;
    text-align: center;
}

.search {
    text-align: center;
    margin: 20px;
}

.search input {
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

button {
    background: #E63946;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    border-radius: 8px;
}
</style>

</head>

<body>

<header>
    <h1>Todo sobre ruedas 🛼</h1>
</header>

<div class="search">
    <input type="text" id="buscar" placeholder="Buscar productos...">
</div>

<div class="grid" id="productos"></div>

<script>
const API = "https://backend-catalogo-r31s.onrender.com/productos";

// cargar productos
async function cargar() {
    const res = await fetch(API);
    const data = await res.json();

    mostrar(data);
}

// mostrar productos
function mostrar(productos) {
    const cont = document.getElementById("productos");
    cont.innerHTML = "";

    productos.forEach(p => {
        cont.innerHTML += `
        <div class="card">
            <img src="${p.imagen}">
            <div class="card-content">
                <h3>${p.nombre}</h3>
                <p>${p.descripcion}</p>
                <b>$${p.precio}</b>
                <button onclick="comprar('${p.nombre}')">Comprar</button>
            </div>
        </div>
        `;
    });
}

// buscar
document.getElementById("buscar").addEventListener("input", async (e) => {
    const res = await fetch(API);
    const productos = await res.json();

    const filtrados = productos.filter(p =>
        p.nombre.toLowerCase().includes(e.target.value.toLowerCase())
    );

    mostrar(filtrados);
});

// función botón
function comprar(nombre) {
    alert("Producto: " + nombre);
}

// iniciar
cargar();
</script>

</body>
</html>
